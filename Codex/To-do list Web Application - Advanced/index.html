<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">To-Do List</h1>
        <p class="app__subtitle">Simple, clean, and always saved.</p>
      </header>

      <section class="app__input">
        <label class="visually-hidden" for="taskInput">Add a task</label>
        <input id="taskInput" type="text" placeholder="Type a new task..." autocomplete="off" />
        <button id="addBtn" type="button">Add</button>
      </section>
      <p id="errorMsg" class="error" role="alert" aria-live="polite"></p>

      <section class="app__list">
        <ul id="taskList" aria-live="polite"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
