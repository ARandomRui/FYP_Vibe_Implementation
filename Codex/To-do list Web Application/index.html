<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minimal To-Do</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" aria-labelledby="app-title">
    <header class="header">
      <p class="eyebrow">To-Do</p>
      <h1 id="app-title">Keep it simple.</h1>
      <p class="sub">Add tasks, check them off, or delete them.</p>
    </header>

    <form class="composer" id="todo-form" autocomplete="off">
      <label class="sr-only" for="todo-input">Add a task</label>
      <input id="todo-input" name="todo" type="text" placeholder="Add a new task" maxlength="120" required />
      <button type="submit" aria-label="Add task">Add</button>
    </form>

    <section class="list-wrap" aria-live="polite" aria-busy="false">
      <ul id="todo-list" class="list" role="list"></ul>
      <p id="empty-state" class="empty">No tasks yet. Add your first one.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
