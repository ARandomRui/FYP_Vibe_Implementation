<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>My To-Do List</h1>
      <p>Stay focused and keep moving.</p>
    </header>

    <form id="task-form" class="task-form" autocomplete="off">
      <label class="sr-only" for="task-input">Task</label>
      <input
        id="task-input"
        type="text"
        name="task"
        placeholder="Add a new task..."
        maxlength="120"
        required
      />
      <button type="submit">Add</button>
    </form>

    <section class="task-panel" aria-live="polite">
      <ul id="task-list" class="task-list"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add your first one above.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
